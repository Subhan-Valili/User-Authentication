databaseChangeLog:
  - changeSet:
      id: 1-create-permissions-table
      author: Subhan-Valili
      changes:
        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true